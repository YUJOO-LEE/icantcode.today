version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Bump open-PR limit so per-package major bumps don't get squeezed
    # out by the patch/minor groups below.
    open-pull-requests-limit: 10
    # Skip ecosystem-blocked majors. Re-enable each entry when the
    # blocker is resolved.
    #   eslint / @eslint/js v10 — eslint-plugin-react and
    #     eslint-plugin-jsx-a11y don't yet declare ESLint 10 in their
    #     peer ranges (only an RC for plugin-react). Revisit once both
    #     ship a stable ESLint 10-compatible release.
    #   vite v8 / @vitejs/plugin-react v6 — Vite 8 cascades through
    #     the build/test toolchain (plugin-react, vitest config) and
    #     should be planned as a coordinated migration, not a
    #     standalone dep bump. plugin-react v6 already requires
    #     Vite 8, so they're paired here.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
    groups:
      # Patch/minor only — safe to merge as a single weekly batch.
      # Major bumps fall outside both groups and arrive as individual
      # PRs so each one can be reviewed against its own migration guide
      # (TS 6, Vite 8, Vitest 4, ESLint 10, etc.).
      prod-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
