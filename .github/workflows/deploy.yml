name: CI & Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Run tsc -b
        run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CF_BEACON_TOKEN: ${{ secrets.VITE_CF_BEACON_TOKEN }}

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [audit, typecheck, lint, test, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CF_BEACON_TOKEN: ${{ secrets.VITE_CF_BEACON_TOKEN }}

      - name: SEO smoke check
        run: |
          echo "Checking required SEO elements in dist/index.html..."
          grep -q 'og:image' dist/index.html || (echo "FAIL: og:image missing" && exit 1)
          grep -q 'og:image:type' dist/index.html || (echo "FAIL: og:image:type missing" && exit 1)
          grep -q 'canonical' dist/index.html || (echo "FAIL: canonical missing" && exit 1)
          grep -q 'application/ld+json' dist/index.html || (echo "FAIL: JSON-LD missing" && exit 1)
          grep -q '"@type": "Organization"' dist/index.html || (echo "FAIL: Organization JSON-LD missing" && exit 1)
          grep -q '"@type": "HowTo"' dist/index.html || (echo "FAIL: HowTo JSON-LD missing" && exit 1)
          grep -q 'applicationSubCategory' dist/index.html || (echo "FAIL: WebApplication featureList not enriched" && exit 1)
          grep -q 'hreflang' dist/index.html || (echo "FAIL: hreflang missing" && exit 1)
          grep -q 'rel="manifest"' dist/index.html || (echo "FAIL: manifest link missing" && exit 1)
          test -f dist/site.webmanifest || (echo "FAIL: site.webmanifest missing" && exit 1)
          grep -q 'robots.txt' dist/ -r || test -f dist/robots.txt || (echo "FAIL: robots.txt missing" && exit 1)
          grep -q 'sitemap.xml' dist/ -r || test -f dist/sitemap.xml || (echo "FAIL: sitemap.xml missing" && exit 1)
          echo "✓ All SEO checks passed"

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
