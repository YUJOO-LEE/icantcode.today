name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# PR에서 새 commit이 오면 이전 run을 즉시 cancel — 큐 정체 방지.
# master push에서는 cancel하지 않아 모든 commit이 검증됨 (release commit 포함).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Run tsc -b
        run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Run tests with coverage
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    needs: [audit, typecheck, lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_CF_BEACON_TOKEN: ${{ secrets.VITE_CF_BEACON_TOKEN }}
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}

      - name: SEO smoke check
        run: |
          echo "Checking required SEO elements in dist/index.html..."
          grep -q 'og:image' dist/index.html || (echo "FAIL: og:image missing" && exit 1)
          grep -q 'og:image:type' dist/index.html || (echo "FAIL: og:image:type missing" && exit 1)
          grep -q 'canonical' dist/index.html || (echo "FAIL: canonical missing" && exit 1)
          grep -q 'application/ld+json' dist/index.html || (echo "FAIL: JSON-LD missing" && exit 1)
          grep -q '"@type": "Organization"' dist/index.html || (echo "FAIL: Organization JSON-LD missing" && exit 1)
          grep -q '"@type": "HowTo"' dist/index.html || (echo "FAIL: HowTo JSON-LD missing" && exit 1)
          grep -q 'applicationSubCategory' dist/index.html || (echo "FAIL: WebApplication featureList not enriched" && exit 1)
          grep -q 'hreflang' dist/index.html || (echo "FAIL: hreflang missing" && exit 1)
          grep -q 'rel="manifest"' dist/index.html || (echo "FAIL: manifest link missing" && exit 1)
          test -f dist/site.webmanifest || (echo "FAIL: site.webmanifest missing" && exit 1)
          grep -q 'robots.txt' dist/ -r || test -f dist/robots.txt || (echo "FAIL: robots.txt missing" && exit 1)
          grep -q 'sitemap.xml' dist/ -r || test -f dist/sitemap.xml || (echo "FAIL: sitemap.xml missing" && exit 1)

          echo "Checking per-route prerendered HTML..."
          test -f dist/game/index.html || (echo "FAIL: dist/game/index.html missing" && exit 1)
          test -f dist/game/fall-f/index.html || (echo "FAIL: dist/game/fall-f/index.html missing" && exit 1)

          # Each route must have its own canonical pointing at itself.
          grep -q 'rel="canonical" href="https://icantcode.today/"' dist/index.html \
            || (echo "FAIL: home canonical wrong" && exit 1)
          grep -q 'rel="canonical" href="https://icantcode.today/game"' dist/game/index.html \
            || (echo "FAIL: /game canonical wrong" && exit 1)
          grep -q 'rel="canonical" href="https://icantcode.today/game/fall-f"' dist/game/fall-f/index.html \
            || (echo "FAIL: /game/fall-f canonical wrong" && exit 1)

          # Per-route JSON-LD additions land in the correct files only.
          grep -q '"@type": "BreadcrumbList"' dist/game/index.html \
            || (echo "FAIL: BreadcrumbList missing on /game" && exit 1)
          grep -q '"@type": "VideoGame"' dist/game/fall-f/index.html \
            || (echo "FAIL: VideoGame missing on /game/fall-f" && exit 1)
          grep -q '"@type": "BreadcrumbList"' dist/game/fall-f/index.html \
            || (echo "FAIL: BreadcrumbList missing on /game/fall-f" && exit 1)
          ! grep -q '"@type": "BreadcrumbList"' dist/index.html \
            || (echo "FAIL: BreadcrumbList should not appear on home" && exit 1)
          ! grep -q '"@type": "VideoGame"' dist/index.html \
            || (echo "FAIL: VideoGame should not appear on home" && exit 1)

          # Sanity: titles must be route-distinct (no two routes share the same <title>).
          home_title=$(grep -oE '<title>[^<]+</title>' dist/index.html | head -1)
          game_title=$(grep -oE '<title>[^<]+</title>' dist/game/index.html | head -1)
          fallf_title=$(grep -oE '<title>[^<]+</title>' dist/game/fall-f/index.html | head -1)
          test "$home_title" != "$game_title" \
            || (echo "FAIL: home and /game share the same <title>" && exit 1)
          test "$game_title" != "$fallf_title" \
            || (echo "FAIL: /game and /game/fall-f share the same <title>" && exit 1)
          test "$home_title" != "$fallf_title" \
            || (echo "FAIL: home and /game/fall-f share the same <title>" && exit 1)

          echo "✓ All SEO checks passed"

      - name: Upload dist artifact for e2e
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline --no-audit --no-fund

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() && failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
